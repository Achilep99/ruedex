name: ruedex_mvp
description: Jeu mobile de collection de plaques de rue parisiennes.
publish_to: "none"
version: 0.4.0+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0
  google_mlkit_text_recognition: ^0.15.1
  geolocator: ^14.0.3
  image_picker: ^1.2.2
  image: ^4.8.0
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/paris_streets.json
    - assets/data/rarity_overrides.json
