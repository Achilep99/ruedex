name: Construire APK RueDex

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Creer les fichiers Android manquants
        run: |
          flutter create --platforms=android --org com.ruedex .
          rm -f test/widget_test.dart

      - name: Configurer Android
        shell: pwsh
        run: ./tools/configure_android.ps1

      - name: Installer les dependances
        run: flutter pub get

      - name: Executer les tests
        run: flutter test

      - name: Construire APK de test
        run: flutter build apk --debug

      - name: Publier APK telechargeable
        uses: actions/upload-artifact@v4
        with:
          name: RueDex-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
