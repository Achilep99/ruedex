name: Construire APK RueDex V3

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Créer les fichiers Android manquants
        run: |
          flutter create --platforms=android --org com.ruedex .
          rm -f test/widget_test.dart

      - name: Télécharger la base officielle de Paris
        run: |
          mkdir -p build_data
          curl -L --fail --retry 4 --retry-delay 3 \
            "https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/denominations-emprises-voies-actuelles/exports/json" \
            -o build_data/denominations.json
          curl -L --fail --retry 4 --retry-delay 3 \
            "https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/troncon_voie/exports/json" \
            -o build_data/troncons.json

      - name: Générer la base RueDex de Paris
        run: |
          python tools/build_paris_database.py \
            --denominations build_data/denominations.json \
            --segments build_data/troncons.json \
            --rarity-overrides assets/data/rarity_overrides.json \
            --output assets/data/paris_streets.json \
            --minimum-streets 3000
          du -h assets/data/paris_streets.json

      - name: Configurer Android
        shell: pwsh
        run: ./tools/configure_android.ps1

      - name: Installer les dépendances
        run: flutter pub get

      - name: Formater le code
        run: dart format lib test

      - name: Analyser le code
        run: flutter analyze --no-fatal-infos

      - name: Exécuter les tests
        run: flutter test

      - name: Construire les deux APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p artifacts
          flutter build apk --debug             --dart-define=RUEDEX_DEV_TOOLS=true             --dart-define=SUPABASE_URL=$SUPABASE_URL             --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          cp build/app/outputs/flutter-apk/app-debug.apk artifacts/RueDex-developpeur.apk
          flutter build apk --release             --dart-define=RUEDEX_DEV_TOOLS=false             --dart-define=SUPABASE_URL=$SUPABASE_URL             --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/RueDex-utilisateur.apk

      - name: Publier les APK téléchargeables
        uses: actions/upload-artifact@v4
        with:
          name: RueDex-V3-APK
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 14
